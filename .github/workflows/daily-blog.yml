name: Daily Blog Publish

on:
  workflow_dispatch:
    inputs:
      topic:
        description: Optional topic override for a manual run
        required: false
        type: string
      candidate_id:
        description: "Optional candidate id for a manual run (for example: landing-youtube-brand-deals)"
        required: false
        type: string
      layer:
        description: Optional layer override for a manual run
        required: false
        type: string
      product:
        description: Optional product override for a manual run
        required: false
        type: string
      batch_preset:
        description: "Optional batch preset (use landing_support_top10 to publish the 10 landing support articles)"
        required: false
        type: string
      dry_run:
        description: Generate and validate without uploading to OSS
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "20 1 * * *"

concurrency:
  group: daily-blog-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      TZ: Asia/Shanghai
      BLOG_AI_BASE_URL: https://yunwu.ai
      BLOG_TEXT_MODEL: gemini-3-flash-preview
      BLOG_IMAGE_MODEL: gemini-3.1-flash-image-preview
      BLOG_TIMEZONE: Asia/Shanghai
      BLOG_OSS_ENDPOINT: oss-ap-southeast-1.aliyuncs.com
      BLOG_OSS_BUCKET: lgi-static
      BLOG_OSS_PREFIX: blog
      BLOG_AI_API_KEY: ${{ secrets.BLOG_AI_API_KEY }}
      BLOG_OSS_ACCESS_KEY_ID: ${{ secrets.BLOG_OSS_ACCESS_KEY_ID }}
      BLOG_OSS_ACCESS_KEY_SECRET: ${{ secrets.BLOG_OSS_ACCESS_KEY_SECRET }}
      BLOG_REVALIDATE_SECRET: ${{ secrets.BLOG_REVALIDATE_SECRET }}
      BLOG_CURRENTS_API_KEY: ${{ secrets.BLOG_CURRENTS_API_KEY }}
      BLOG_GNEWS_API_KEY: ${{ secrets.BLOG_GNEWS_API_KEY }}
      BLOG_DINGTALK_WEBHOOK: ${{ secrets.BLOG_DINGTALK_WEBHOOK }}
      BLOG_DINGTALK_SECRET: ${{ secrets.BLOG_DINGTALK_SECRET }}
      SITE_BASE_URL: ${{ vars.SITE_BASE_URL }}
      # Recommended value: https://collabgrow.lgi365.com
      BLOG_SEARCH_CONSOLE_PROPERTY: ${{ vars.BLOG_SEARCH_CONSOLE_PROPERTY }}
      # Store the full service account JSON as a GitHub Actions secret.
      BLOG_SEARCH_CONSOLE_CREDENTIAL_JSON: ${{ secrets.BLOG_SEARCH_CONSOLE_CREDENTIAL_JSON }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run blog publish flow
        env:
          BLOG_TOPIC_OVERRIDE: ${{ inputs.topic }}
          BLOG_CANDIDATE_ID: ${{ inputs.candidate_id }}
          BLOG_LAYER_OVERRIDE: ${{ inputs.layer }}
          BLOG_PRODUCT_OVERRIDE: ${{ inputs.product }}
          BLOG_BATCH_PRESET: ${{ inputs.batch_preset }}
          BLOG_DRY_RUN: ${{ inputs.dry_run }}
        run: |
          set -euo pipefail

          if [ "${BLOG_DRY_RUN:-false}" = "true" ]; then
            SCRIPT_NAME="blog:publish:dry-run"
            MODE_LABEL="dry-run"
          else
            SCRIPT_NAME="blog:publish"
            MODE_LABEL="publish"
          fi

          echo "Running mode: ${MODE_LABEL}"
          echo "Candidate override: ${BLOG_CANDIDATE_ID:-}"
          echo "Topic override: ${BLOG_TOPIC_OVERRIDE:-}"
          echo "Layer override: ${BLOG_LAYER_OVERRIDE:-}"
          echo "Product override: ${BLOG_PRODUCT_OVERRIDE:-}"
          echo "Batch preset: ${BLOG_BATCH_PRESET:-}"

          run_single() {
            local candidate_id="${1:-}"
            local topic="${2:-}"
            local layer="${3:-}"
            local product="${4:-}"
            local args=()

            if [ -n "${candidate_id}" ]; then
              args+=(--candidate-id "${candidate_id}")
            elif [ -n "${topic}" ]; then
              args+=(--topic "${topic}")
            fi

            if [ -n "${layer}" ]; then
              args+=(--layer "${layer}")
            fi

            if [ -n "${product}" ]; then
              args+=(--product "${product}")
            fi

            echo "Executing: pnpm run ${SCRIPT_NAME} -- ${args[*]}"
            pnpm run "${SCRIPT_NAME}" -- "${args[@]}"
          }

          if [ -n "${BLOG_BATCH_PRESET:-}" ]; then
            case "${BLOG_BATCH_PRESET}" in
              landing_support_top10)
                for candidate_id in \
                  landing-brand-deals-for-creators \
                  landing-ugc-brand-deals \
                  landing-tiktok-brand-deals \
                  landing-instagram-brand-deals \
                  landing-youtube-brand-deals \
                  landing-beauty-brand-deals \
                  landing-skincare-brand-deals \
                  landing-australia-paid-collabs \
                  landing-free-product-collabs \
                  landing-micro-influencer-brand-deals
                do
                  run_single "${candidate_id}" "" "" ""
                done
                ;;
              *)
                echo "Unknown batch preset: ${BLOG_BATCH_PRESET}"
                exit 1
                ;;
            esac
          else
            run_single \
              "${BLOG_CANDIDATE_ID:-}" \
              "${BLOG_TOPIC_OVERRIDE:-}" \
              "${BLOG_LAYER_OVERRIDE:-}" \
              "${BLOG_PRODUCT_OVERRIDE:-}"
          fi
